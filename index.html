<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velarya Atlas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <div id="map">
      <img id="mapImage" src="karte.png" alt="Karte von Velarya" draggable="false">
      <svg id="routes"></svg>
      <div id="markers"></div>
    </div>
  </div>

  <div id="ui">
    <input id="search" type="search" placeholder="Stadt suchen...">
    <select id="fromCity"><option value="">Von...</option></select>
    <select id="toCity"><option value="">Nach...</option></select>
    <button id="showRoutes">Route zeigen</button>
    <button id="clearRoutes">Löschen</button>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
